name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[api,aws]"

      - name: Check installed dependencies
        run: python -m pip check

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests

      - name: Smoke CLI entry points
        run: |
          tailwag --help
          tailwag schema init --help
          tailwag episode create --help
          tailwag inspect --help
          tailwag slack poll --help

  static-checks:
    name: Static deployment checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install cfn-lint

      - name: Validate JSON examples
        run: |
          python -m json.tool deploy/ecs-task-definition.example.json >/dev/null
          python -m json.tool deploy/aws/iam/tailwag-api-task-policy.example.json >/dev/null
          python -m json.tool deploy/aws/iam/tailwag-scheduler-policy.example.json >/dev/null
          python -m json.tool deploy/aws/iam/tailwag-worker-policy.example.json >/dev/null
          python -m json.tool deploy/aws/iam/tailwag-github-actions-deploy-policy.example.json >/dev/null
          python -m json.tool deploy/aws/iam/tailwag-github-actions-deploy-trust.example.json >/dev/null
          python -m json.tool deploy/aws/scheduler/slack-poll-schedule.example.json >/dev/null
          python -m json.tool deploy/aws/scheduler/report-generate-schedule.example.json >/dev/null
          for path in examples/*.json; do
            python -m json.tool "$path" >/dev/null
          done

      - name: Check deployment shell scripts
        run: |
          sh -n deploy/aws/scripts/build-push-api-image.sh
          sh -n deploy/aws/scripts/package-worker-zip.sh

      - name: Lint CloudFormation
        run: cfn-lint -t deploy/aws/cloudformation/tailwag-memory-core.yaml --regions us-east-2

  package-build:
    name: Package build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build and check package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t tailwag-memory-api:${{ github.sha }} .
